<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>ANM HK PPT 智能搜尋</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; }
        .header { text-align: center; margin-bottom: 20px; }
        #searchInput { width: 100%; padding: 10px; font-size: 16px; border: 2px solid #ccc; box-sizing: border-box; }
        .song-item { margin: 10px 0; padding: 10px; border-bottom: 1px solid #eee; }
        .song-id { color: red; font-weight: bold; margin-right: 10px; }
        .tag-chorus { color: red; font-weight: bold; font-size: 0.9em; margin-left: 10px; }
        img { max-width: 100%; height: auto; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>ANM HK PPT 智能搜尋</h1>
        <img src="image_4.png" alt="ANM HK">
    </div>

    <input type="text" id="searchInput" placeholder="請輸入關鍵字 (支援模糊搜尋)...">
    <div id="results"></div>

    <script src="songs_data.js"></script>
    <script>
        // 1. 標準化函式：處理錯別字，確保搜尋與顯示一致
        const normalize = (text) => {
            return text.toLowerCase()
                .replace(/注/g, '註').replace(/裏/g, '裡').replace(/他/g, '祂');
        };

        const input = document.getElementById('searchInput');
        const results = document.getElementById('results');

        // 2. 搜尋邏輯
        input.addEventListener('input', function() {
            const val = normalize(this.value);
            results.innerHTML = '';
            if (val === '') return;

            songs.forEach(song => {
                const songText = normalize(song.text);
                // 支援 4 字以上模糊搜尋
                const isMatch = songText.includes(val) || 
                              (val.length >= 4 && songText.includes(val.substring(0, val.length - 1)));
                
                if (isMatch) {
                    // 標準化顯示文字
                    let displayTitle = song.text.replace(/注/g, '註').replace(/裏/g, '裡').replace(/他/g, '祂');
                    
                    // 3. 自動偵測引號標記
                    let tag = "";
                    // 單引號 (副歌)
                    if (song.text.includes('「') || song.text.includes('」') || song.text.includes("'")) {
                        tag = ' <span class="tag-chorus">(副歌)</span>';
                    } 
                    // 雙引號 (Bridge)
                    else if (song.text.includes('『') || song.text.includes('』') || song.text.includes('"')) {
                        tag = ' <span class="tag-chorus">(Bridge)</span>';
                    }

                    results.innerHTML += `<div class="song-item">
                        <span class="song-id">${song.id}</span>${displayTitle}${tag}
                    </div>`;
                }
            });
        });
    </script>
</body>
</html>
